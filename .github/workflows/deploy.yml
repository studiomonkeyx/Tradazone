name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Quality gates ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm test

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --legacy-peer-deps

      - name: Stamp build version
        run: echo "{\"v\":\"${{ github.sha }}\"}" > public/version.json

      - name: Build
        run: npm run build
        env:
          VITE_APP_ENV:                production
          VITE_BASE_PATH:              /Tradazone/
          VITE_APP_NAME:               Tradazone
          VITE_API_URL:                ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL:           ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:      ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_WALLETCONNECT_PROJECT_ID: d30b837db2592d6f405f75c8ed425b3a
          VITE_SENTRY_DSN:             ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY:            ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_WEBHOOK_URL:            ${{ secrets.VITE_WEBHOOK_URL }}
          VITE_SEP38_URL:              ${{ secrets.VITE_SEP38_URL }}
          SENTRY_AUTH_TOKEN:           ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Check bundle sizes
        run: |
          FAIL=0; FAIL_KB=1100; WARN_KB=600
          for f in dist/assets/*.js; do
            kb=$(du -k "$f" | cut -f1)
            name=$(basename "$f")
            if [ "$kb" -gt "$FAIL_KB" ]; then
              echo "❌ FAIL $name — ${kb}kB > ${FAIL_KB}kB limit"; FAIL=1
            elif [ "$kb" -gt "$WARN_KB" ]; then
              echo "⚠️  WARN $name — ${kb}kB"
            else
              echo "✅ OK   $name — ${kb}kB"
            fi
          done
          [ $FAIL -eq 0 ] || { echo "Bundle limit exceeded."; exit 1; }

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
