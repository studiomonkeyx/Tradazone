<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradazone</title>
  <script>
    // Force a fresh load whenever a new build is deployed.
    // Fetches version.json with cache bypassed; if the build ID changed
    // since the user's last visit, location.reload(true) discards the
    // cached index.html and pulls the latest assets.
    (function () {
      fetch('./version.json?_=' + Date.now(), { cache: 'no-store' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var k = 'tz_build';
          var prev = localStorage.getItem(k);
          localStorage.setItem(k, d.v);
          if (prev && prev !== d.v) { location.reload(true); }
        })
        .catch(function () {});
    })();
  </script>
  <meta name="description" content="Tradazone makes receiving local and international payments easier for African entrepreneurs using cryptocurrency." />

  <!-- Open Graph / Facebook / LinkedIn / WhatsApp / Telegram / Discord -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tradazone.github.io/Tradazone/" />
  <meta property="og:title" content="Tradazone — Transforming payment in Africa with cryptocurrency" />
  <meta property="og:description" content="Tradazone makes receiving local and international payments easier for African entrepreneurs using cryptocurrency." />
  <meta property="og:image" content="https://tradazone.github.io/Tradazone/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://tradazone.github.io/Tradazone/" />
  <meta name="twitter:title" content="Tradazone — Transforming payment in Africa with cryptocurrency" />
  <meta name="twitter:description" content="Tradazone makes receiving local and international payments easier for African entrepreneurs using cryptocurrency." />
  <meta name="twitter:image" content="https://tradazone.github.io/Tradazone/preview.png" />
  <script>
    // Restore URL encoded by 404.html so React Router sees the correct path
    (function (l) {
      if (l.search[1] === 'p') {
        var params = l.search.slice(1).split('&').reduce(function (p, s) {
          var r = s.split('=');
          p[decodeURIComponent(r[0])] = decodeURIComponent(r.slice(1).join('=').replace(/~and~/g, '&'));
          return p;
        }, {});
        if (params.p !== undefined) {
          window.history.replaceState(
            null, null,
            l.pathname.split('/').slice(0, -1).join('/') + (params.p || '/') +
            (params.q ? '?' + params.q : '') + l.hash
          );
        }
      }
    }(window.location));
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
